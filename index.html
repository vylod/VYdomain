<html lang="en" dir="ltr" data-theme="dark" data-color="purple">
<head>

   <meta name="twitter:description" content="Find the perfect domain for your idea with real-time DNS availability check.">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap');

        :root[data-theme="dark"] {
            --bg-color: #0f1115;
            --surface-color: #1c1f26;
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --border-color: #2d3139;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            --error-color: #ef4444;
        }

        :root[data-theme="light"] {
            --bg-color: #f8fafc;
            --surface-color: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --border-color: #e2e8f0;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            --error-color: #ef4444;
        }

        :root[data-color="purple"] { --primary: #8b5cf6; --primary-hover: #7c3aed; --primary-text: #fff; }
        :root[data-color="gold"] { --primary: #fbbf24; --primary-hover: #f59e0b; --primary-text: #000; }
        :root[data-color="black-gray"] { --primary: #475569; --primary-hover: #334155; --primary-text: #fff; }
        :root[data-color="dark-blue"] { --primary: #1e3a8a; --primary-hover: #1e40af; --primary-text: #fff; }
        :root[data-color="cloudy-white"] { --primary: #e2e8f0; --primary-hover: #cbd5e1; --primary-text: #000; }
        :root[data-color="aqua-blue"] { --primary: #06b6d4; --primary-hover: #0891b2; --primary-text: #fff; }
        :root[data-color="herbal-green"] { --primary: #10b981; --primary-hover: #059669; --primary-text: #fff; }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            background-color: var(--surface-color);
            border-bottom: 1px solid var(--border-color);
            box-shadow: var(--shadow);
            flex-wrap: wrap;
            gap: 15px;
            position: relative;
            z-index: 1000;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: 1px;
        }

        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        select, button {
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-color);
            color: var(--text-primary);
            cursor: pointer;
            outline: none;
            font-size: 0.9rem;
        }

        button.toggle-mode {
            background-color: var(--surface-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px;
        }

        .hero-text {
            text-align: center;
            margin-bottom: 40px;
        }

        .hero-text h1 {
            font-size: 2.5rem;
            margin-bottom: 15px;
        }

        .hero-text p {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        .search-box {
            display: flex;
            width: 100%;
            max-width: 600px;
            background-color: var(--surface-color);
            border-radius: 12px;
            padding: 8px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
        }

        .search-box input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 15px;
            font-size: 1.2rem;
            color: var(--text-primary);
            outline: none;
            direction: ltr;
            text-align: left;
        }
        
        [dir="rtl"] .search-box input {
            text-align: right;
        }

        .search-box button {
            background-color: var(--primary);
            color: var(--primary-text);
            border: none;
            padding: 0 30px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 8px;
            transition: background-color 0.2s ease, transform 0.1s ease;
        }

        .search-box button:hover {
            background-color: var(--primary-hover);
        }

        .search-box button:active {
            transform: scale(0.97);
        }

        .results-container {
            width: 100%;
            max-width: 1000px;
            margin-top: 40px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 15px;
            padding-bottom: 50px;
        }

        /* تنسيقات البطاقة الكبيرة للامتدادات والنطاقات الكاملة */
        .large-card {
            grid-column: 1 / -1;
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 30px;
            box-shadow: var(--shadow);
            animation: fadeIn 0.4s ease forwards;
            display: flex;
            flex-direction: column;
            gap: 25px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }

        .large-card-header {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
            text-align: center;
            direction: ltr;
        }

        .large-card-content {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            align-items: center;
        }

        .large-card-img {
            flex: 1;
            min-width: 300px;
            height: 250px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            object-fit: cover;
            background: var(--bg-color);
        }

        .large-card-details {
            flex: 1;
            min-width: 250px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
            font-size: 1.1rem;
        }

        .info-row span {
            color: var(--text-secondary);
        }

        .buy-links {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .buy-links a {
            padding: 10px 20px;
            background: var(--primary);
            color: var(--primary-text);
            border-radius: 8px;
            text-decoration: none;
            font-size: 1rem;
            font-weight: bold;
            transition: background 0.3s ease;
            text-align: center;
            flex: 1;
            min-width: 120px;
        }

        .buy-links a:hover {
            background: var(--primary-hover);
        }

        .domain-card {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
            animation: fadeIn 0.4s ease forwards;
            cursor: pointer;
            position: relative;
        }

        .domain-card:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
            z-index: 100;
        }

        .domain-name {
            font-size: 1.1rem;
            font-weight: 500;
            direction: ltr;
        }

        .status {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
        }

        .status.available {
            background-color: rgba(16, 185, 129, 0.1);
            color: #10b981;
        }

        .status.taken {
            background-color: rgba(239, 68, 68, 0.1);
            color: var(--error-color);
        }

        .status.loading-status {
            background-color: var(--border-color);
            color: var(--text-secondary);
            animation: pulse 1.5s infinite;
        }

        .preview-tooltip {
            position: absolute;
            top: 110%;
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            width: 250px;
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            padding: 12px;
            z-index: 999;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }

        @media (hover: hover) {
            .domain-card:hover .preview-tooltip {
                opacity: 1;
                visibility: visible;
                transform: translateX(-50%) translateY(0);
            }
        }

        .preview-img {
            width: 100%;
            height: 130px;
            border-radius: 8px;
            object-fit: cover;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
        }

        .preview-details {
            display: flex;
            flex-direction: column;
            gap: 6px;
            font-size: 0.85rem;
        }

        .preview-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-secondary);
        }

        .preview-row strong {
            color: var(--text-primary);
        }

        /* تنسيقات التذييل (Footer) */
        .site-footer {
            margin-top: auto;
            padding: 20px;
            text-align: center;
            background-color: var(--surface-color);
            border-top: 1px solid var(--border-color);
        }

        .site-footer a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: color 0.3s ease;
            direction: ltr;
            display: inline-block;
        }

        .site-footer a:hover {
            color: var(--primary);
        }

        /* تنسيقات الإشعار المخصص (Custom Alert) */
        .custom-alert {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background-color: var(--surface-color);
            color: var(--text-primary);
            padding: 15px 25px;
            border-radius: 12px;
            border-left: 5px solid var(--error-color);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            gap: 12px;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            z-index: 9999;
            font-size: 1rem;
            font-weight: 500;
        }

        .custom-alert.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
            visibility: visible;
        }

        [dir="rtl"] .custom-alert {
            border-left: none;
            border-right: 5px solid var(--error-color);
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .search-box {
                flex-direction: column;
                background: transparent;
                box-shadow: none;
                border: none;
                padding: 0;
            }
            .search-box input {
                background-color: var(--surface-color);
                border: 1px solid var(--border-color);
                border-radius: 12px;
                margin-bottom: 10px;
                text-align: center;
            }
            .search-box button {
                padding: 15px;
            }
            header {
                flex-direction: column;
            }
            .controls {
                justify-content: center;
            }
            .large-card-img {
                height: 200px;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">VY<span style="color: var(--text-primary)">domain</span></div>
        <div class="controls">
            <select id="langSelector">
                <option value="en">English</option>
                <option value="ar">العربية</option>
            </select>
            
            <select id="themeSelector">
                <option value="purple">Purple</option>
                <option value="gold">Gold</option>
                <option value="black-gray">Black & Gray</option>
                <option value="dark-blue">Dark Blue</option>
                <option value="cloudy-white">Cloudy White</option>
                <option value="aqua-blue">Aqua Blue</option>
                <option value="herbal-green">Herbal Green</option>
            </select>
            
            <button id="modeToggle" class="toggle-mode" title="Toggle Mode">
                ☀️ / 🌙
            </button>
        </div>
    </header>

    <main>
        <div class="hero-text">
            <h1 id="heroTitle">Find the Perfect Domain for Your Idea</h1>
            <p id="heroDesc">Enter a name to check actual domain availability via DNS servers.</p>
        </div>

        <div class="search-box">
            <input type="text" id="domainInput" placeholder="Enter name here (e.g. myproject or .com or google.com)" autocomplete="off" spellcheck="false">
            <button id="searchBtn" onclick="startSearch()">Search</button>
        </div>

        <div class="results-container" id="resultsArea"></div>
    </main>

    <!-- صندوق الإشعار المخصص -->
    <div id="customAlert" class="custom-alert"></div>

    <!-- التذييل -->
    <footer class="site-footer">
        <a href="https://github.com/vylod/VYdomain" target="_blank" rel="noopener noreferrer">
            website made by : sr vylod ● github repository
        </a>
    </footer>

    <script>
        const translations = {
            en: {
                title: "VYdomain | Real Search",
                heroTitle: "Find the Perfect Domain for Your Idea",
                heroDesc: "Enter a name to check actual domain availability via DNS servers.",
                placeholder: "Enter name here (e.g. myproject or .com or google.com)",
                searchBtn: "Search",
                alertEmpty: "Please enter a valid name (English letters and numbers only).",
                checking: "Checking...",
                available: "Available",
                taken: "Taken",
                error: "Error",
                speed: "Speed",
                pages: "Pages",
                home: "Home, About...",
                domainAvailable: "Domain is available for registration",
                price: "Estimated Price",
                perYear: "/ year",
                colors: ["Purple", "Gold", "Black & Gray", "Dark Blue", "Cloudy White", "Aqua Blue", "Herbal Green"],
                statusLabel: "Status",
                infoLabel: "Description",
                buyHere: "Buy From:",
                visitWebsite: "Visit Website",
                registerNow: "Register Now",
                noWebsite: "No Website Published Yet"
            },
            ar: {
                title: "VYdomain | بحث حقيقي",
                heroTitle: "ابحث عن النطاق المثالي لفكرتك",
                heroDesc: "أدخل الاسم للتحقق الفعلي من توفر النطاقات عبر خوادم DNS.",
                placeholder: "أدخل الاسم هنا (مثال: myproject أو .com أو google.com)",
                searchBtn: "بحث",
                alertEmpty: "يرجى إدخال اسم صحيح للبحث (حروف إنجليزية وأرقام فقط).",
                checking: "جاري الفحص...",
                available: "متاح",
                taken: "مأخوذ",
                error: "خطأ",
                speed: "السرعة",
                pages: "الصفحات",
                home: "الرئيسية، اتصل بنا...",
                domainAvailable: "النطاق متاح للتسجيل",
                price: "السعر التقريبي",
                perYear: "/ سنوياً",
                colors: ["بنفسجي", "ذهبي", "أسود رمادي", "أزرق غامق", "أبيض سحابي", "أزرق مائي", "أخضر عشبي"],
                statusLabel: "الحالة",
                infoLabel: "الوصف",
                buyHere: "أماكن الشراء:",
                visitWebsite: "زيارة الموقع",
                registerNow: "سجل الآن",
                noWebsite: "لا يوجد موقع منشور بعد"
            }
        };

        const domainPrices = {
            '.com': '$10.99', '.net': '$12.99', '.org': '$11.99', '.info': '$14.99',
            '.biz': '$15.99', '.co': '$25.99', '.io': '$39.99', '.ai': '$69.99',
            '.app': '$14.99', '.dev': '$14.99', '.tech': '$4.99', '.network': '$18.99',
            '.store': '$1.99', '.shop': '$2.99', '.online': '$1.99', '.market': '$24.99',
            '.me': '$18.99', '.tv': '$29.99', '.design': '$4.99', '.art': '$13.99',
            '.blog': '$24.99', '.pro': '$16.99', '.site': '$1.99', '.website': '$1.99',
            '.space': '$1.99', '.club': '$13.99', '.xyz': '$1.99', '.global': '$69.99',
            '.us': '$7.99', '.uk': '$6.99', '.ca': '$11.99', '.in': '$5.99'
        };

        const tldInfo = {
            en: {
                '.com': 'Commercial businesses and general purpose.',
                '.net': 'Network infrastructures and technology.',
                '.org': 'Organizations, non-profits, and communities.',
                '.info': 'Informational sites and resources.',
                '.io': 'Tech startups, software, and games.',
                '.ai': 'Artificial Intelligence projects.',
                'default': 'A popular domain extension for global use.'
            },
            ar: {
                '.com': 'الأعمال التجارية والأغراض العامة.',
                '.net': 'البنى التحتية للشبكات والتكنولوجيا.',
                '.org': 'المنظمات غير الربحية والمجتمعات.',
                '.info': 'المواقع المعلوماتية والمصادر.',
                '.io': 'الشركات التقنية الناشئة والبرمجيات والألعاب.',
                '.ai': 'مشاريع الذكاء الاصطناعي.',
                'default': 'امتداد نطاق شهير للاستخدام العالمي.'
            }
        };

        function getDomainPrice(domain) {
            const ext = domain.substring(domain.lastIndexOf('.'));
            return domainPrices[ext] || '$12.99'; 
        }

        function getTldDescription(ext) {
            return tldInfo[currentLang][ext] || tldInfo[currentLang]['default'];
        }

        let currentLang = 'en';

        const htmlElement = document.documentElement;
        const langSelector = document.getElementById('langSelector');
        const themeSelector = document.getElementById('themeSelector');
        const resultsArea = document.getElementById('resultsArea');
        let alertTimeout;

        function changeLanguage(lang) {
            currentLang = lang;
            htmlElement.lang = lang;
            htmlElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
            
            document.title = translations[lang].title;
            document.getElementById('heroTitle').textContent = translations[lang].heroTitle;
            document.getElementById('heroDesc').textContent = translations[lang].heroDesc;
            document.getElementById('searchBtn').textContent = translations[lang].searchBtn;
            document.getElementById('domainInput').placeholder = translations[lang].placeholder;

            Array.from(themeSelector.options).forEach((option, index) => {
                option.text = translations[lang].colors[index];
            });

            resultsArea.innerHTML = '';
        }

        langSelector.addEventListener('change', (e) => {
            changeLanguage(e.target.value);
        });

        const modeToggle = document.getElementById('modeToggle');
        modeToggle.addEventListener('click', () => {
            const currentMode = htmlElement.getAttribute('data-theme');
            const newMode = currentMode === 'dark' ? 'light' : 'dark';
            htmlElement.setAttribute('data-theme', newMode);
        });

        themeSelector.addEventListener('change', (e) => {
            htmlElement.setAttribute('data-color', e.target.value);
        });

        function showCustomAlert(message) {
            const alertBox = document.getElementById('customAlert');
            alertBox.textContent = message;
            alertBox.classList.add('show');
            
            clearTimeout(alertTimeout);
            alertTimeout = setTimeout(() => {
                alertBox.classList.remove('show');
            }, 3500); 
        }

        const extensions = Object.keys(domainPrices); 

        function startSearch() {
            const inputElement = document.getElementById('domainInput');
            let originalValue = inputElement.value.trim().toLowerCase();

            if (!originalValue) {
                resultsArea.innerHTML = ''; 
                inputElement.value = '';
                showCustomAlert(translations[currentLang].alertEmpty);
                return;
            }

            resultsArea.innerHTML = ''; 

            // ميزة 1: إذا كان الإدخال يبدأ بنقطة (امتداد مثل .com)
            if (originalValue.startsWith('.')) {
                showExtensionInfo(originalValue);
                return;
            }

            // ميزة 2: إذا كان الإدخال يحتوي على نقطة في الوسط (موقع كامل مثل google.com)
            if (originalValue.includes('.')) {
                showFullDomainInfo(originalValue);
                return;
            }

            // البحث العادي في حال إدخال اسم فقط
            let domainName = originalValue.replace(/[^a-z0-9\-]/g, '');
            if (!domainName) {
                showCustomAlert(translations[currentLang].alertEmpty);
                return;
            }

            extensions.forEach((ext, index) => {
                setTimeout(() => {
                    const fullDomain = domainName + ext;
                    
                    const card = document.createElement('div');
                    card.className = 'domain-card';
                    card.onclick = () => window.open(`http://${fullDomain}`, '_blank');
                    
                    card.innerHTML = `
                        <div class="domain-name">${fullDomain}</div>
                        <div class="status loading-status">${translations[currentLang].checking}</div>
                        <div class="preview-tooltip">
                            <div style="text-align:center; padding:20px; color:var(--text-secondary)">${translations[currentLang].checking}</div>
                        </div>
                    `;
                    
                    resultsArea.appendChild(card);
                    checkRealDomain(fullDomain, card);
                }, index * 20);
            });
        }

        function showExtensionInfo(ext) {
            const price = domainPrices[ext] || '$12.99';
            const description = getTldDescription(ext);
            const pureExt = ext.replace('.', '');

            const card = document.createElement('div');
            card.className = 'large-card';
            card.innerHTML = `
                <div class="large-card-header">${ext}</div>
                <div class="large-card-content">
                    <div class="large-card-details">
                        <div class="info-row">
                            <span>${translations[currentLang].price}:</span>
                            <strong style="color: var(--text-primary)">${price} ${translations[currentLang].perYear}</strong>
                        </div>
                        <div class="info-row">
                            <span>${translations[currentLang].infoLabel}:</span>
                            <strong style="color: var(--text-primary)">${description}</strong>
                        </div>
                        <div style="margin-top:20px;">
                            <div style="color:var(--text-secondary); margin-bottom:10px;">${translations[currentLang].buyHere}</div>
                            <div class="buy-links">
                                <a href="https://www.namecheap.com/domains/registration/results/?domain=${pureExt}" target="_blank">Namecheap</a>
                                <a href="https://www.godaddy.com/domainsearch/find?domainToCheck=${pureExt}" target="_blank">GoDaddy</a>
                                <a href="https://domains.google.com/registrar/search?searchTerm=${pureExt}" target="_blank">Google Domains</a>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            resultsArea.appendChild(card);
        }

        async function showFullDomainInfo(domain) {
            const card = document.createElement('div');
            card.className = 'large-card';
            card.innerHTML = `<div style="text-align:center; padding: 40px; font-size: 1.2rem; color: var(--text-secondary);">${translations[currentLang].checking}</div>`;
            resultsArea.appendChild(card);

            try {
                const response = await fetch(`https://dns.google/resolve?name=${domain}&type=ANY`);
                const data = await response.json();

                const isAvailable = data.Status === 3;
                const statusText = isAvailable ? translations[currentLang].available : translations[currentLang].taken;
                const statusColor = isAvailable ? '#10b981' : 'var(--error-color)';
                const mockSpeed = (Math.random() * 2 + 0.4).toFixed(1) + 's';
                const price = getDomainPrice(domain);

                card.innerHTML = `
                    <div class="large-card-header">${domain}</div>
                    <div class="large-card-content">
                        ${!isAvailable 
                            ? `<img class="large-card-img" src="https://image.thum.io/get/width/600/crop/800/http://${domain}" onerror="this.src='https://via.placeholder.com/600x400?text=No+Preview'" alt="${domain}">` 
                            : `<div class="large-card-img" style="display:flex;align-items:center;justify-content:center;font-size:1.5rem;color:var(--text-secondary)">${translations[currentLang].noWebsite}</div>`
                        }
                        <div class="large-card-details">
                            <div class="info-row">
                                <span>${translations[currentLang].statusLabel}:</span>
                                <strong style="color: ${statusColor}">${statusText}</strong>
                            </div>
                            
                            ${!isAvailable ? `
                            <div class="info-row">
                                <span>${translations[currentLang].speed}:</span>
                                <strong style="color: var(--text-primary)">${mockSpeed}</strong>
                            </div>
                            <div class="info-row">
                                <span>${translations[currentLang].pages}:</span>
                                <strong style="color: var(--text-primary)">${translations[currentLang].home}</strong>
                            </div>
                            <div class="buy-links" style="margin-top:20px;">
                                <a href="http://${domain}" target="_blank">${translations[currentLang].visitWebsite}</a>
                            </div>
                            ` : `
                            <div class="info-row">
                                <span>${translations[currentLang].price}:</span>
                                <strong style="color: var(--text-primary)">${price} ${translations[currentLang].perYear}</strong>
                            </div>
                            <div class="buy-links" style="margin-top:20px;">
                                <a href="https://www.namecheap.com/domains/registration/results/?domain=${domain}" target="_blank">${translations[currentLang].registerNow}</a>
                            </div>
                            `}
                        </div>
                    </div>
                `;
            } catch (error) {
                card.innerHTML = `<div style="text-align:center; padding: 40px; color: var(--error-color); font-size: 1.2rem;">${translations[currentLang].error}</div>`;
            }
        }

        async function checkRealDomain(domain, cardElement) {
            const statusElement = cardElement.querySelector('.status');
            const tooltip = cardElement.querySelector('.preview-tooltip');
            
            try {
                const response = await fetch(`https://dns.google/resolve?name=${domain}&type=ANY`);
                const data = await response.json();

                if (data.Status === 3) {
                    statusElement.className = 'status available';
                    statusElement.textContent = translations[currentLang].available;
                    
                    const price = getDomainPrice(domain);
                    
                    tooltip.innerHTML = `
                        <div style="text-align:center; padding:8px;">
                            <div style="color: #10b981; font-weight: bold; margin-bottom: 12px;">${translations[currentLang].domainAvailable}</div>
                            <div style="display: flex; justify-content: space-between; align-items: center; padding-top: 10px; border-top: 1px solid var(--border-color);">
                                <span style="color: var(--text-secondary); font-size: 0.9rem;">${translations[currentLang].price}:</span>
                                <div>
                                    <strong style="color: var(--text-primary); font-size: 1.2rem;">${price}</strong>
                                    <span style="font-size: 0.75rem; color: var(--text-secondary);">${translations[currentLang].perYear}</span>
                                </div>
                            </div>
                        </div>
                    `;
                } else {
                    statusElement.className = 'status taken';
                    statusElement.textContent = translations[currentLang].taken;
                    
                    const mockSpeed = (Math.random() * 2 + 0.4).toFixed(1) + 's';
                    
                    tooltip.innerHTML = `
                        <img class="preview-img" src="https://image.thum.io/get/width/250/crop/600/http://${domain}" alt="Preview" onerror="this.src='https://via.placeholder.com/250x130?text=No+Preview'">
                        <div class="preview-details">
                            <div class="preview-row"><span>${translations[currentLang].speed}:</span> <strong>${mockSpeed}</strong></div>
                            <div class="preview-row"><span>${translations[currentLang].pages}:</span> <strong>${translations[currentLang].home}</strong></div>
                        </div>
                    `;
                }
            } catch (error) {
                statusElement.className = 'status taken';
                statusElement.textContent = translations[currentLang].error;
                tooltip.innerHTML = `<div style="text-align:center; padding:15px; color:var(--text-secondary)">${translations[currentLang].error}</div>`;
            }
        }

        document.getElementById('domainInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                startSearch();
            }
        });
    </script>
</body>
</html>
